# External API declaration. Declare domains your app needs to reach.
# At install time, admins see exactly which endpoints the app will use.

api.example.com:
  paths:
    allowlist:
      - /v1/
      - /api/public/
    blocklist:
      - /v1/internal/
      - /api/admin/
  headers:
    inject:
      Authorization: '`Bearer ${C.kv.api_key}`'
      X-API-Version: '2024-01'
    allowlist:
      - Content-Type
      - x-request-id
      - x-*
    blocklist:
      - X-Sensitive-Header
      - Cookie
  timeout: 30000
  # Verify the upstream TLS certificate chain. Leave as `true` for production
  # endpoints. Set to `false` only when targeting trusted internal endpoints
  # that present self-signed or otherwise untrusted certificates.
  rejectUnauthorized: true
